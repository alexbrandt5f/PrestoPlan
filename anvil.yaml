allow_embedding: false
db_schema:
  users:
    client: none
    columns:
    - admin_ui: {order: 0, width: 200}
      client_hidden: false
      name: email
      type: string
    - admin_ui: {order: 1, width: 200}
      client_hidden: false
      name: enabled
      type: bool
    - admin_ui: {order: 2, width: 200}
      client_hidden: false
      name: last_login
      type: datetime
    - admin_ui: {order: 3, width: 200}
      client_hidden: false
      name: password_hash
      type: string
    - admin_ui: {order: 4, width: 200}
      client_hidden: false
      name: n_password_failures
      type: number
    - admin_ui: {order: 5, width: 200}
      client_hidden: false
      name: confirmed_email
      type: bool
    - admin_ui: {order: 6, width: 200}
      client_hidden: false
      name: remembered_logins
      type: simpleObject
    - admin_ui: {order: 7, width: 200}
      client_hidden: false
      name: signed_up
      type: datetime
    server: full
    title: Users
dependencies: []
name: PrestoPlan
native_deps:
  head_html: |-
    <script src="https://cdn.plot.ly/plotly-2.27.0.min.js"></script>
    <script>
      // ===========================================================================
      //  PrestoPlan Gantt - JavaScript layer
      //
      //  All layout constants come from Python via js_data so they stay in sync.
      //  JS reads: toolbarH, detailsH, navH, colHeaderH, rowH from _pp object.
      //
      //  Tunable splitter:
      //    PP_COL_MIN_W : minimum column table width px
      //    PP_SPLIT_W   : splitter handle width px
      //    PP_COLLAPSE_MS : animation duration ms
      // ===========================================================================

      var PP_COL_MIN_W   = 120;
      var PP_SPLIT_W     = 6;
      var PP_COLLAPSE_MS = 200;

      var _pp = {
        form:           null,
        traces:         [],
        layout:         {},
        rowMeta:        [],
        collapseState:  {},
        totalRows:      0,
        detailsVisible: true,
        sidebarVisible: false,
        monthBands:     [],
        weekTicks:      [],
        barColCount:    0,
        colsPerWeek:    7,
        // layout heights from Python
        toolbarH:    36,
        detailsH:    220,
        navH:        56,
        colHeaderH:  48,
        rowH:        24,
      };


      // ---------------------------------------------------------------------------
      //  CLEANUP - removes stale pp-shell from a previous render
      // ---------------------------------------------------------------------------
      window._pp_cleanup = function() {
        var old = document.getElementById('pp-shell');
        if (old && old.parentElement) old.parentElement.removeChild(old);
      };


      // ---------------------------------------------------------------------------
      //  UTILITY - set innerHTML of an element by id (called from Python)
      // ---------------------------------------------------------------------------
      window._pp_setHtml = function(id, html) {
        var el = document.getElementById(id);
        if (el) el.innerHTML = html;
      };


      // ---------------------------------------------------------------------------
      //  UTILITY - execute a JS string (called from Python for tab button styles)
      // ---------------------------------------------------------------------------
      window._pp_execJs = function(js) {
        try { (new Function(js))(); } catch(e) { console.warn('_pp_execJs error:', e); }
      };


      // ---------------------------------------------------------------------------
      //  TOOLBAR CALLBACKS - called by onclick in toolbar HTML
      // ---------------------------------------------------------------------------
      window._pp_onChangeProject = function() {
        if (_pp.form) anvil.call(_pp.form, '_on_change_project');
      };
      window._pp_onSidebarClick = function() {
        if (_pp.form) anvil.call(_pp.form, '_on_sidebar_toggle');
      };
      window._pp_onDetailsClick = function() {
        if (_pp.form) anvil.call(_pp.form, '_on_details_toggle');
      };
      window._pp_onGfsToggle = function() {
        var panel = document.getElementById('pp-gfs-panel');
        var btn   = document.getElementById('pp-btn-gfs');
        if (!panel) return;
        var open = panel.style.display === 'none' || panel.style.display === '';
        panel.style.display = open ? 'block' : 'none';
        if (btn) btn.textContent = (open ? '▼' : '▶') + ' Grouping / Filtering / Sorting';
        if (_pp.form) anvil.call(_pp.form, '_on_gfs_toggle');
      };
      window._pp_onApplyFilters = function() {
        if (_pp.form) anvil.call(_pp.form, '_on_apply_filters');
      };
      window._pp_onClearFilters = function() {
        if (_pp.form) anvil.call(_pp.form, '_on_clear_filters');
      };
      window._pp_onLayoutChange = function(val) {
        if (_pp.form) anvil.call(_pp.form, '_on_layout_change', val);
      };
      window._pp_onTabClick = function(tabName) {
        if (_pp.form) anvil.call(_pp.form, '_on_tab_click', tabName);
      };


      // ---------------------------------------------------------------------------
      //  ENTRY POINT
      // ---------------------------------------------------------------------------
      window._pp_init = function(form, jsonData) {
        var data          = JSON.parse(jsonData);
        _pp.form          = form;
        _pp.traces        = data.traces;
        _pp.layout        = data.layout;
        _pp.rowMeta       = data.rowMeta;
        _pp.collapseState = data.collapseState;
        _pp.totalRows     = data.rowMeta.length;
        _pp.detailsVisible = true;
        _pp.sidebarVisible = false;
        _pp.monthBands    = data.monthBands  || [];
        _pp.weekTicks     = data.weekTicks   || [];
        _pp.barColCount   = data.barColCount || 0;
        _pp.colsPerWeek   = data.colsPerWeek || 7;
        _pp.toolbarH      = data.toolbarH    || 36;
        _pp.detailsH      = data.detailsH    || 220;
        _pp.navH          = data.navH        || 56;
        _pp.colHeaderH    = data.colHeaderH  || 48;
        _pp.rowH          = data.rowH        || 24;

        _pp_applyLayout();
        _pp_renderPlotly();
        _pp_buildTimescaleHeader();
        _pp_applyCollapseState(false);
        _pp_setupScrollSync();
        _pp_setupSplitter();
        _pp_setupKeyboard();
        window.addEventListener('resize', function() {
          _pp_applyLayout();
          _pp_rebuildTimescaleHeader();
        });
      };


      // ---------------------------------------------------------------------------
      //  LAYOUT ENGINE
      //  pp-shell is position:fixed below the Anvil nav bar.
      //  Internal structure (top to bottom):
      //    pp-toolbar    (toolbarH px)
      //    pp-main-row   (fills remaining height minus detailsH)
      //      pp-sidebar  (sidebarW or 0)
      //      pp-gantt-area
      //        pp-col-header  (colHeaderH px) <-- timescale + col names SAME element
      //        pp-scroll-body (remaining)
      //          pp-col-data | pp-splitter | pp-plot-pane
      //    pp-details    (detailsH px)
      // ---------------------------------------------------------------------------
      function _pp_applyLayout() {
        var winH     = window.innerHeight;
        var winW     = window.innerWidth;
        var navH     = _pp.navH;
        var toolbarH = _pp.toolbarH;
        var detH     = _pp.detailsVisible ? _pp.detailsH : 0;
        var hdrH     = _pp.colHeaderH;
        var sidW     = _pp.sidebarVisible ? 220 : 0;

        var shellH   = winH - navH;
        var mainH    = shellH - toolbarH - detH;
        var bodyH    = mainH - hdrH;

        // Shell
        _pp_css('pp-shell', {
          position:      'fixed',
          top:           navH + 'px',
          left:          '0',
          right:         '0',
          bottom:        '0',
          width:         '100%',
          display:       'flex',
          flexDirection: 'column',
          overflow:      'hidden',
          zIndex:        '10',
          background:    'white',
          boxSizing:     'border-box',
        });

        // Toolbar
        _pp_css('pp-toolbar', {
          height:    toolbarH + 'px',
          minHeight: toolbarH + 'px',
          flexShrink: '0',
        });

        // Main row
        _pp_css('pp-main-row', {
          display:       'flex',
          flexDirection: 'row',
          flex:          '1 1 auto',
          height:        mainH + 'px',
          minHeight:     '0',
          overflow:      'hidden',
        });

        // Sidebar
        var sidebar = document.getElementById('pp-sidebar');
        if (sidebar) {
          sidebar.style.width     = sidW + 'px';
          sidebar.style.minWidth  = sidW + 'px';
          sidebar.style.maxWidth  = sidW + 'px';
          sidebar.style.display   = sidW === 0 ? 'none' : 'flex';
          sidebar.style.flexDirection = 'column';
          sidebar.style.overflowY = 'auto';
          sidebar.style.overflowX = 'hidden';
          sidebar.style.borderRight = '2px solid #cccccc';
          sidebar.style.background  = '#fafafa';
          sidebar.style.flexShrink  = '0';
          sidebar.style.boxSizing   = 'border-box';
        }

        // Gantt area
        _pp_css('pp-gantt-area', {
          display:       'flex',
          flexDirection: 'column',
          flex:          '1 1 auto',
          minWidth:      '0',
          overflow:      'hidden',
        });

        // Unified header (col names + timescale, same height)
        _pp_css('pp-col-header', {
          display:      'flex',
          flexDirection: 'row',
          height:       hdrH + 'px',
          minHeight:    hdrH + 'px',
          flexShrink:   '0',
          overflow:     'hidden',
          borderBottom: '2px solid #999',
          background:   '#1565c0',
        });

        // Scroll body
        _pp_css('pp-scroll-body', {
          display:       'flex',
          flexDirection: 'row',
          flex:          '1 1 auto',
          height:        bodyH + 'px',
          minHeight:     '0',
          overflow:      'hidden',
        });

        // Col data - width driven by the table inside it
        var colTable = document.getElementById('pp-col-table');
        var colW = colTable ? Math.max(PP_COL_MIN_W, colTable.offsetWidth) : 300;
        _pp_css('pp-col-data', {
          width:      colW + 'px',
          minWidth:   colW + 'px',
          maxWidth:   colW + 'px',
          overflowY:  'auto',
          overflowX:  'hidden',
          flexShrink: '0',
          background: 'white',
        });

        // Update pp-col-names width to match
        var colNames = document.getElementById('pp-col-names');
        if (colNames) {
          colNames.style.width    = colW + 'px';
          colNames.style.minWidth = colW + 'px';
          colNames.style.maxWidth = colW + 'px';
        }
        // Update splitter spacer
        _pp_css('pp-header-splitter-spacer', {
          width:    PP_SPLIT_W + 'px',
          minWidth: PP_SPLIT_W + 'px',
        });

        // Splitter handle
        _pp_css('pp-splitter', {
          width:      PP_SPLIT_W + 'px',
          minWidth:   PP_SPLIT_W + 'px',
          background: '#bdbdbd',
          cursor:     'col-resize',
          flexShrink: '0',
          zIndex:     '5',
        });

        // Plot pane
        _pp_css('pp-plot-pane', {
          flex:      '1 1 auto',
          overflowY: 'auto',
          overflowX: 'auto',
          minWidth:  '0',
        });

        // Details pane
        var det = document.getElementById('pp-details');
        if (det) {
          det.style.height     = _pp.detailsH + 'px';
          det.style.minHeight  = _pp.detailsH + 'px';
          det.style.maxHeight  = _pp.detailsH + 'px';
          det.style.flexShrink = '0';
          det.style.display    = _pp.detailsVisible ? 'flex' : 'none';
          det.style.flexDirection = 'column';
          det.style.overflowY  = 'hidden';
          det.style.background = '#f9f9f9';
          det.style.borderTop  = '2px solid #cccccc';
        }
      }

      function _pp_css(id, styles) {
        var el = document.getElementById(id);
        if (!el) return;
        Object.keys(styles).forEach(function(k) { el.style[k] = styles[k]; });
      }


      // ---------------------------------------------------------------------------
      //  TIMESCALE HEADER
      //  Builds month/week cells into pp-header-months and pp-header-weeks.
      //  Called after _pp_applyLayout so pp-header-right has its final width.
      // ---------------------------------------------------------------------------
      function _pp_buildTimescaleHeader() {
        var plotPane = document.getElementById('pp-plot-pane');
        var plotW    = plotPane ? plotPane.offsetWidth : 800;
        var pxPerCol = _pp.barColCount > 0 ? plotW / _pp.barColCount : 1;

        var monthRow = document.getElementById('pp-header-months');
        var weekRow  = document.getElementById('pp-header-weeks');
        if (!monthRow || !weekRow) return;

        monthRow.innerHTML = '';
        weekRow.innerHTML  = '';

        _pp.monthBands.forEach(function(band) {
          var w    = Math.round((band.endCol - band.startCol) * pxPerCol);
          var cell = document.createElement('div');
          cell.style.cssText = 'width:'+w+'px; min-width:'+w+'px; overflow:hidden;'
            +' white-space:nowrap; padding:3px 4px; font-size:11px; font-weight:bold;'
            +' color:white; font-family:Arial,sans-serif;'
            +' border-right:1px solid #0d47a1; box-sizing:border-box;';
          cell.textContent = band.label;
          monthRow.appendChild(cell);
        });

        for (var i = 0; i < _pp.weekTicks.length; i++) {
          var tick    = _pp.weekTicks[i];
          var nextCol = i + 1 < _pp.weekTicks.length ? _pp.weekTicks[i+1].col : _pp.barColCount;
          var w2      = Math.round((nextCol - tick.col) * pxPerCol);
          var cell2   = document.createElement('div');
          cell2.style.cssText = 'width:'+w2+'px; min-width:'+w2+'px; overflow:hidden;'
            +' white-space:nowrap; padding:3px 4px; font-size:10px;'
            +' color:#bbdefb; font-family:Arial,sans-serif;'
            +' border-right:1px solid #0d47a1; box-sizing:border-box;';
          cell2.textContent = tick.label;
          weekRow.appendChild(cell2);
        }
      }

      function _pp_rebuildTimescaleHeader() {
        // After splitter drag: update spacer + recalculate cell widths
        var colData = document.getElementById('pp-col-data');
        var colW    = colData ? colData.offsetWidth : 0;

        var spacer = document.getElementById('pp-header-splitter-spacer');
        if (spacer) {
          spacer.style.width    = PP_SPLIT_W + 'px';
          spacer.style.minWidth = PP_SPLIT_W + 'px';
        }
        var colNames = document.getElementById('pp-col-names');
        if (colNames) {
          colNames.style.width    = colW + 'px';
          colNames.style.minWidth = colW + 'px';
          colNames.style.maxWidth = colW + 'px';
        }

        var plotPane = document.getElementById('pp-plot-pane');
        var plotW    = plotPane ? plotPane.offsetWidth : 800;
        var pxPerCol = _pp.barColCount > 0 ? plotW / _pp.barColCount : 1;

        var monthRow = document.getElementById('pp-header-months');
        if (monthRow) {
          var mcells = monthRow.children;
          for (var i = 0; i < mcells.length && i < _pp.monthBands.length; i++) {
            var w = Math.round((_pp.monthBands[i].endCol - _pp.monthBands[i].startCol) * pxPerCol);
            mcells[i].style.width    = w + 'px';
            mcells[i].style.minWidth = w + 'px';
          }
        }
        var weekRow = document.getElementById('pp-header-weeks');
        if (weekRow) {
          var wcells = weekRow.children;
          for (var j = 0; j < wcells.length && j < _pp.weekTicks.length; j++) {
            var nextCol = j + 1 < _pp.weekTicks.length ? _pp.weekTicks[j+1].col : _pp.barColCount;
            var w2 = Math.round((nextCol - _pp.weekTicks[j].col) * pxPerCol);
            wcells[j].style.width    = w2 + 'px';
            wcells[j].style.minWidth = w2 + 'px';
          }
        }
      }


      // ---------------------------------------------------------------------------
      //  PLOTLY RENDER
      // ---------------------------------------------------------------------------
      function _pp_renderPlotly() {
        var div = document.getElementById('pp-plotly-div');
        if (!div) { setTimeout(_pp_renderPlotly, 200); return; }

        Plotly.newPlot(div, _pp.traces, _pp.layout, {
          responsive: false, displayModeBar: false
        });

        div.on('plotly_click', function(data) {
          if (!data || !data.points || !data.points.length) return;
          var pt     = data.points[0];
          var taskId = String(pt.customdata || pt.text || '').trim();
          if (!taskId || taskId === 'undefined' || taskId === 'null') return;
          if (_pp.form) anvil.call(_pp.form, '_on_gantt_click', {text: taskId});
        });
      }


      // ---------------------------------------------------------------------------
      //  COLLAPSE LOGIC
      // ---------------------------------------------------------------------------
      function _pp_isRowVisible(idx) {
        var meta = _pp.rowMeta[idx];
        if (!meta) return true;
        var pid = meta.parentWbsId;
        while (pid) {
          if (_pp.collapseState[pid] === false) return false;
          var owner = null;
          for (var i = 0; i < _pp.rowMeta.length; i++) {
            if (_pp.rowMeta[i].wbsId === pid && _pp.rowMeta[i].rowType === 'WBS') {
              owner = _pp.rowMeta[i]; break;
            }
          }
          pid = owner ? owner.parentWbsId : null;
        }
        return true;
      }

      function _pp_applyCollapseState(animate) {
        var table = document.getElementById('pp-col-table');
        if (!table) return;

        table.querySelectorAll('tr[data-row-idx]').forEach(function(tr) {
          var idx  = parseInt(tr.getAttribute('data-row-idx'));
          var meta = _pp.rowMeta[idx];
          if (!meta) return;
          var vis = _pp_isRowVisible(idx);
          var cur = tr.style.display !== 'none';

          if (animate && !vis && cur) {
            tr.style.transition = 'opacity ' + PP_COLLAPSE_MS + 'ms';
            tr.style.opacity = '0';
            setTimeout(function() {
              tr.style.display = 'none'; tr.style.opacity = ''; tr.style.transition = '';
            }, PP_COLLAPSE_MS);
          } else if (animate && vis && !cur) {
            tr.style.display = '';
            tr.style.opacity = '0';
            tr.style.transition = 'opacity ' + PP_COLLAPSE_MS + 'ms';
            setTimeout(function() {
              tr.style.opacity = '1';
              setTimeout(function() { tr.style.opacity = ''; tr.style.transition = ''; }, PP_COLLAPSE_MS);
            }, 10);
          } else {
            tr.style.display = vis ? '' : 'none';
          }

          if (meta.rowType === 'WBS' && meta.wbsId) {
            var icon = tr.querySelector('.pp-wbs-icon');
            if (icon) icon.textContent = (_pp.collapseState[meta.wbsId] !== false) ? '▼' : '▶';
          }
        });

        setTimeout(_pp_syncPlotlyToCollapse, animate ? PP_COLLAPSE_MS + 50 : 0);
      }

      function _pp_syncPlotlyToCollapse() {
        var newY = {}, yPos = 0;
        for (var i = 0; i < _pp.rowMeta.length; i++) {
          if (_pp_isRowVisible(i)) newY[i] = yPos++;
        }
        var visCount  = yPos;

        var newTraces = JSON.parse(JSON.stringify(_pp.traces));
        newTraces.forEach(function(trace) {
          if (!trace.y) return;
          var nx = [], ny = [], nt = [], nc = [];
          for (var i = 0; i < trace.y.length; i++) {
            var y = trace.y[i];
            if (y === null || y === undefined) {
              nx.push(null); ny.push(null);
              nt.push(trace.text       ? (trace.text[i]       || '') : '');
              nc.push(trace.customdata ? (trace.customdata[i]  || '') : '');
            } else {
              var ri = Math.round(y);
              if (newY.hasOwnProperty(ri)) {
                nx.push(trace.x[i]); ny.push(newY[ri]);
                nt.push(trace.text       ? (trace.text[i]       || '') : '');
                nc.push(trace.customdata ? (trace.customdata[i]  || '') : '');
              }
            }
          }
          trace.x = nx; trace.y = ny;
          if (trace.text)       trace.text       = nt;
          if (trace.customdata) trace.customdata = nc;
        });

        var newLayout = JSON.parse(JSON.stringify(_pp.layout));
        if (newLayout.shapes) {
          newLayout.shapes = newLayout.shapes
            .filter(function(s) { var ri = Math.round((s.y0+s.y1)/2); return newY.hasOwnProperty(ri); })
            .map(function(s) {
              var ny2 = newY[Math.round((s.y0+s.y1)/2)];
              return Object.assign({}, s, {y0: ny2-0.5, y1: ny2+0.5});
            });
        }
        var newH = Math.max(_pp.rowH, visCount * _pp.rowH);
        newLayout.height = newH;
        newLayout.yaxis.range = [visCount, -1];

        var plotDiv = document.getElementById('pp-plotly-div');
        if (plotDiv) plotDiv.style.height = newH + 'px';
        Plotly.react(plotDiv, newTraces, newLayout, {responsive:false, displayModeBar:false});
      }


      // ---------------------------------------------------------------------------
      //  WBS TOGGLE
      // ---------------------------------------------------------------------------
      window._pp_toggleWbs = function(wbsId) {
        var cur = (_pp.collapseState[wbsId] !== false);
        _pp.collapseState[wbsId] = !cur;
        _pp_applyCollapseState(PP_COLLAPSE_MS > 0);
        if (_pp.form) anvil.call(_pp.form, '_on_collapse_change', wbsId, !cur);
      };
      window._pp_expandAll = function() {
        _pp.rowMeta.forEach(function(m) { if (m.wbsId) _pp.collapseState[m.wbsId] = true; });
        _pp_applyCollapseState(false);
        if (_pp.form) anvil.call(_pp.form, '_on_collapse_all', true);
      };
      window._pp_collapseAll = function() {
        _pp.rowMeta.forEach(function(m) {
          if (m.wbsId && m.depth === 1) _pp.collapseState[m.wbsId] = false;
        });
        _pp_applyCollapseState(false);
        if (_pp.form) anvil.call(_pp.form, '_on_collapse_all', false);
      };


      // ---------------------------------------------------------------------------
      //  SIDEBAR / DETAILS TOGGLES
      // ---------------------------------------------------------------------------
      window._pp_toggleSidebar = function(visible) {
        _pp.sidebarVisible = visible;
        _pp_applyLayout();
        _pp_rebuildTimescaleHeader();
      };
      window._pp_toggleDetails = function(visible) {
        _pp.detailsVisible = visible;
        _pp_applyLayout();
      };


      // ---------------------------------------------------------------------------
      //  KEYBOARD SHORTCUTS
      // ---------------------------------------------------------------------------
      function _pp_setupKeyboard() {
        document.addEventListener('keydown', function(e) {
          if (!e.ctrlKey) return;
          if (e.key === '=' || e.key === '+') { e.preventDefault(); _pp_expandAll(); }
          if (e.key === '-')                  { e.preventDefault(); _pp_collapseAll(); }
        });
      }


      // ---------------------------------------------------------------------------
      //  DRAGGABLE SPLITTER
      // ---------------------------------------------------------------------------
      function _pp_setupSplitter() {
        var splitter = document.getElementById('pp-splitter');
        var colData  = document.getElementById('pp-col-data');
        if (!splitter || !colData) return;

        var dragging = false, startX = 0, startW = 0;

        splitter.addEventListener('mousedown', function(e) {
          dragging = true; startX = e.clientX; startW = colData.offsetWidth;
          document.body.style.cursor = 'col-resize';
          document.body.style.userSelect = 'none';
          e.preventDefault();
        });
        document.addEventListener('mousemove', function(e) {
          if (!dragging) return;
          var newW = Math.max(PP_COL_MIN_W, startW + (e.clientX - startX));
          colData.style.width    = newW + 'px';
          colData.style.minWidth = newW + 'px';
          colData.style.maxWidth = newW + 'px';
          // Keep col-names header in sync
          var colNames = document.getElementById('pp-col-names');
          if (colNames) {
            colNames.style.width    = newW + 'px';
            colNames.style.minWidth = newW + 'px';
            colNames.style.maxWidth = newW + 'px';
          }
        });
        document.addEventListener('mouseup', function() {
          if (!dragging) return;
          dragging = false;
          document.body.style.cursor = '';
          document.body.style.userSelect = '';
          var plotDiv  = document.getElementById('pp-plotly-div');
          var plotPane = document.getElementById('pp-plot-pane');
          if (plotDiv && plotPane) Plotly.relayout(plotDiv, {width: plotPane.offsetWidth});
          _pp_rebuildTimescaleHeader();
        });
      }


      // ---------------------------------------------------------------------------
      //  SCROLL SYNC
      //  Vertical:   col-data <-> plot-pane
      //  Horizontal: plot-pane -> header-right (timescale tracks bars)
      // ---------------------------------------------------------------------------
      function _pp_setupScrollSync() {
        var colPane  = document.getElementById('pp-col-data');
        var plotPane = document.getElementById('pp-plot-pane');
        var hdrRight = document.getElementById('pp-header-right');
        if (!colPane || !plotPane) return;

        var syncing = false;
        colPane.addEventListener('scroll', function() {
          if (syncing) return; syncing = true;
