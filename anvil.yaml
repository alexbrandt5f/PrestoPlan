    client: none
    columns:
    - admin_ui: {order: 0, width: 200}
      client_hidden: false
      name: email
      type: string
    - admin_ui: {order: 1, width: 200}
      client_hidden: false
      name: enabled
      type: bool
    - admin_ui: {order: 2, width: 200}
      client_hidden: false
      name: last_login
      type: datetime
    - admin_ui: {order: 3, width: 200}
      client_hidden: false
      name: password_hash
      type: string
    - admin_ui: {order: 4, width: 200}
      client_hidden: false
      name: n_password_failures
      type: number
    - admin_ui: {order: 5, width: 200}
      client_hidden: false
      name: confirmed_email
      type: bool
    - admin_ui: {order: 6, width: 200}
      client_hidden: false
      name: remembered_logins
      type: simpleObject
    - admin_ui: {order: 7, width: 200}
      client_hidden: false
      name: signed_up
      type: datetime
    server: full
    title: Users
dependencies: []
name: PrestoPlan
native_deps:
  head_html: |-
    <script src="https://cdn.plot.ly/plotly-2.27.0.min.js"></script>
    <script>
      // ===========================================================================
      //  PrestoPlan Gantt – JavaScript layer  v4
      //
      //  v4: Nav bar items are Anvil components managed by Python (no JS injection).
      //       JS handles: layout, Plotly, collapse, splitter, scroll sync,
      //       table row click → details, timescale pan/zoom (left-edge anchored).
      // ===========================================================================

      var PP_COL_MIN_W   = 120;
      var PP_SPLIT_W     = 6;
      var PP_COLLAPSE_MS = 200;
      var PP_TS_SNAP_PX  = 8;

      var _pp = {
        form:           null,
        traces:         [],
        layout:         {},
        rowMeta:        [],
        collapseState:  {},
        totalRows:      0,
        detailsVisible: true,
        sidebarVisible: false,
        monthBands:     [],
        weekTicks:      [],
        barColCount:    0,
        colsPerWeek:    7,
        toolbarH:       0,
        detailsH:       220,
        navH:           56,
        colHeaderH:     48,
        rowH:           24,
        selectedRowIdx: -1,
        selectedTaskId: null,
      };

      // =========================================================================
      //  CLEANUP
      // =========================================================================
      window._pp_cleanup = function() {
        try {
          var old = document.getElementById('pp-shell');
          if (old && old.parentElement) old.parentElement.removeChild(old);
        } catch(e) { console.warn('[_pp_cleanup]', e); }
      };

      // =========================================================================
      //  UTILITIES
      // =========================================================================
      window._pp_setHtml = function(id, html) {
        try {
          var el = document.getElementById(id);
          if (el) el.innerHTML = html;
        } catch(e) { console.warn('[_pp_setHtml]', e); }
      };

      window._pp_execJs = function(js) {
        try { (new Function(js))(); } catch(e) { console.warn('[_pp_execJs]', e); }
      };

      function _pp_css(id, styles) {
        var el = document.getElementById(id);
        if (!el) return;
        Object.keys(styles).forEach(function(k) { el.style[k] = styles[k]; });
      }

      // =========================================================================
      //  CALLBACKS  (toolbar buttons are Anvil components; these are for
      //  HTML-based buttons inside sidebar and details pane)
      // =========================================================================
      window._pp_onGfsToggle = function() {
        try {
          var panel = document.getElementById('pp-gfs-panel');
          var btn   = document.getElementById('pp-btn-gfs');
          if (!panel) return;
          var open = panel.style.display === 'none' || panel.style.display === '';
          panel.style.display = open ? 'block' : 'none';
          if (btn) btn.textContent = (open ? '\u25BC' : '\u25B6') + ' Grouping / Filtering / Sorting';
        } catch(e) { console.warn('[_pp_onGfsToggle]', e); }
      };
      window._pp_onApplyFilters = function() {
        try { if (_pp.form) anvil.call(_pp.form, '_on_apply_filters'); }
        catch(e) { console.warn(e); }
      };
      window._pp_onClearFilters = function() {
        try { if (_pp.form) anvil.call(_pp.form, '_on_clear_filters'); }
        catch(e) { console.warn(e); }
      };
      window._pp_onLayoutChange = function(val) {
        try { if (_pp.form) anvil.call(_pp.form, '_on_layout_change', val); }
        catch(e) { console.warn(e); }
      };
      window._pp_onTabClick = function(tabName) {
        try { if (_pp.form) anvil.call(_pp.form, '_on_tab_click', tabName); }
        catch(e) { console.warn(e); }
      };

      // =========================================================================
      //  SIDEBAR / DETAILS TOGGLES  (called from Python)
      // =========================================================================
      window._pp_toggleSidebar = function(visible) {
        _pp.sidebarVisible = visible;
        _pp_applyLayout();
        _pp_rebuildTimescaleHeader();
      };
      window._pp_toggleDetails = function(visible) {
        _pp.detailsVisible = visible;
        _pp_applyLayout();
      };

      // =========================================================================
      //  ENTRY POINT
      // =========================================================================
      window._pp_init = function(form, jsonData) {
        try {
          var d = JSON.parse(jsonData);
          _pp.form           = form;
          _pp.traces         = d.traces;
          _pp.layout         = d.layout;
          _pp.rowMeta        = d.rowMeta;
          _pp.collapseState  = d.collapseState;
          _pp.totalRows      = d.rowMeta.length;
          _pp.detailsVisible = true;
          _pp.sidebarVisible = false;
          _pp.selectedRowIdx = -1;
          _pp.selectedTaskId = null;
          _pp.monthBands     = d.monthBands  || [];
          _pp.weekTicks      = d.weekTicks   || [];
          _pp.barColCount    = d.barColCount || 0;
          _pp.colsPerWeek    = d.colsPerWeek || 7;
          _pp.toolbarH       = 0;
          _pp.detailsH       = d.detailsH   || 220;
          _pp.navH           = d.navH        || 56;
          _pp.colHeaderH     = d.colHeaderH  || 48;
          _pp.rowH           = d.rowH        || 24;

          _pp_applyLayout();
          _pp_renderPlotly();
          _pp_buildTimescaleHeader();
          _pp_applyCollapseState(false);
          _pp_setupScrollSync();
          _pp_setupSplitter();
          _pp_setupKeyboard();
          _pp_setupTableClickHandlers();
          _pp_setupTimescaleDrag();

          window.addEventListener('resize', function() {
            _pp_applyLayout();
            _pp_rebuildTimescaleHeader();
          });
        } catch(e) {
          console.error('[_pp_init] FATAL:', e);
        }
      };

      // =========================================================================
      //  TABLE ROW CLICK
      // =========================================================================
      function _pp_setupTableClickHandlers() {
        var table = document.getElementById('pp-col-table');
        if (!table) return;
        table.addEventListener('click', function(e) {
          try {
            var tr = e.target;
            while (tr && tr.tagName !== 'TR') tr = tr.parentElement;
            if (!tr || !tr.hasAttribute('data-row-idx')) return;
            var rowIdx = parseInt(tr.getAttribute('data-row-idx'));
            if (isNaN(rowIdx)) return;
            var meta = _pp.rowMeta[rowIdx];
            if (!meta) return;
            if (meta.rowType === 'WBS') return;  // WBS rows toggle collapse
            var taskId = meta.taskId || tr.getAttribute('data-task-id') || '';
            if (!taskId) return;
            _pp_selectRow(rowIdx, taskId);
          } catch(ex) { console.warn('[table click]', ex); }
        });
      }

      function _pp_selectRow(rowIdx, taskId) {
        _pp_clearRowHighlight();
        _pp.selectedRowIdx = rowIdx;
        _pp.selectedTaskId = taskId;
        var table = document.getElementById('pp-col-table');
        if (table) {
          var tr = table.querySelector('tr[data-row-idx="' + rowIdx + '"]');
          if (tr) {
            tr.style.background = '#fff9c4';
            tr.setAttribute('data-pp-selected', 'true');
          }
        }
        if (_pp.form) {
          try { anvil.call(_pp.form, '_on_gantt_click', {text: String(taskId)}); }
          catch(e) { console.warn('[_pp_selectRow]', e); }
        }
      }

      function _pp_clearRowHighlight() {
        var table = document.getElementById('pp-col-table');
        if (!table) return;
        var prev = table.querySelector('tr[data-pp-selected="true"]');
        if (prev) {
          prev.style.background = 'white';
          prev.removeAttribute('data-pp-selected');
        }
      }

      // =========================================================================
      //  LAYOUT ENGINE
      // =========================================================================
      function _pp_applyLayout() {
        var winH = window.innerHeight;
        var navH = _pp.navH;
        var detH = _pp.detailsVisible ? _pp.detailsH : 0;
        var hdrH = _pp.colHeaderH;
        var sidW = _pp.sidebarVisible ? 220 : 0;
        var shellH = winH - navH;
        var mainH  = shellH - detH;
        var bodyH  = mainH - hdrH;

        _pp_css('pp-shell', {
          position:'fixed', top:navH+'px', left:'0', right:'0', bottom:'0',
          width:'100%', display:'flex', flexDirection:'column',
          overflow:'hidden', zIndex:'10', background:'white', boxSizing:'border-box',
        });
        _pp_css('pp-main-row', {
          display:'flex', flexDirection:'row', flex:'1 1 auto',
          height:mainH+'px', minHeight:'0', overflow:'hidden',
        });
        var sb = document.getElementById('pp-sidebar');
        if (sb) {
          sb.style.width=sidW+'px'; sb.style.minWidth=sidW+'px'; sb.style.maxWidth=sidW+'px';
          sb.style.display = sidW===0 ? 'none' : 'flex';
          sb.style.flexDirection='column'; sb.style.overflowY='auto'; sb.style.overflowX='hidden';
          sb.style.borderRight='2px solid #ccc'; sb.style.background='#fafafa';
          sb.style.flexShrink='0'; sb.style.boxSizing='border-box';
        }
        _pp_css('pp-gantt-area', {
          display:'flex', flexDirection:'column', flex:'1 1 auto', minWidth:'0', overflow:'hidden',
        });
        _pp_css('pp-col-header', {
          display:'flex', flexDirection:'row',
          height:hdrH+'px', minHeight:hdrH+'px', flexShrink:'0',
          overflow:'hidden', borderBottom:'2px solid #999', background:'#1565c0',
        });
        _pp_css('pp-scroll-body', {
          display:'flex', flexDirection:'row', flex:'1 1 auto',
          height:bodyH+'px', minHeight:'0', overflow:'hidden',
        });
        var colTable = document.getElementById('pp-col-table');
        var colW = colTable ? Math.max(PP_COL_MIN_W, colTable.offsetWidth) : 300;
        _pp_css('pp-col-data', {
          width:colW+'px', minWidth:colW+'px', maxWidth:colW+'px',
          overflowY:'auto', overflowX:'hidden', flexShrink:'0', background:'white',
        });
        var cn = document.getElementById('pp-col-names');
        if (cn) { cn.style.width=colW+'px'; cn.style.minWidth=colW+'px'; cn.style.maxWidth=colW+'px'; }
        _pp_css('pp-header-splitter-spacer', { width:PP_SPLIT_W+'px', minWidth:PP_SPLIT_W+'px' });
        _pp_css('pp-splitter', {
          width:PP_SPLIT_W+'px', minWidth:PP_SPLIT_W+'px',
          background:'#bdbdbd', cursor:'col-resize', flexShrink:'0', zIndex:'5',
        });
        _pp_css('pp-plot-pane', { flex:'1 1 auto', overflowY:'auto', overflowX:'auto', minWidth:'0' });
        var det = document.getElementById('pp-details');
        if (det) {
          det.style.height=_pp.detailsH+'px'; det.style.minHeight=_pp.detailsH+'px';
          det.style.maxHeight=_pp.detailsH+'px'; det.style.flexShrink='0';
          det.style.display = _pp.detailsVisible ? 'flex' : 'none';
          det.style.flexDirection='column'; det.style.overflowY='hidden';
          det.style.background='#f9f9f9'; det.style.borderTop='2px solid #ccc';
        }
      }

      // =========================================================================
      //  TIMESCALE HEADER
      // =========================================================================
      function _pp_buildTimescaleHeader() {
        var pp = document.getElementById('pp-plot-pane');
        var w  = pp ? pp.offsetWidth : 800;
        var ppc = _pp.barColCount > 0 ? w / _pp.barColCount : 1;
        var mr = document.getElementById('pp-header-months');
        var wr = document.getElementById('pp-header-weeks');
        if (!mr || !wr) return;
        mr.innerHTML = ''; wr.innerHTML = '';
        _pp.monthBands.forEach(function(b) {
          var cw = Math.round((b.endCol - b.startCol) * ppc);
          var d = document.createElement('div');
          d.className = 'pp-ts-cell';
          d.style.cssText = 'width:'+cw+'px;min-width:'+cw+'px;overflow:hidden;white-space:nowrap;padding:3px 4px;font-size:11px;font-weight:bold;color:white;font-family:Arial,sans-serif;border-right:1px solid #0d47a1;box-sizing:border-box;';
          d.textContent = b.label;
          mr.appendChild(d);
        });
        for (var i=0; i<_pp.weekTicks.length; i++) {
          var t = _pp.weekTicks[i];
          var nc = i+1<_pp.weekTicks.length ? _pp.weekTicks[i+1].col : _pp.barColCount;
          var cw2 = Math.round((nc - t.col) * ppc);
          var d2 = document.createElement('div');
          d2.className = 'pp-ts-cell';
          d2.style.cssText = 'width:'+cw2+'px;min-width:'+cw2+'px;overflow:hidden;white-space:nowrap;padding:3px 4px;font-size:10px;color:#bbdefb;font-family:Arial,sans-serif;border-right:1px solid #0d47a1;box-sizing:border-box;';
          d2.textContent = t.label;
          wr.appendChild(d2);
        }
      }

      function _pp_rebuildTimescaleHeader() {
        var cd = document.getElementById('pp-col-data');
        var cw = cd ? cd.offsetWidth : 0;
        var sp = document.getElementById('pp-header-splitter-spacer');
        if (sp) { sp.style.width=PP_SPLIT_W+'px'; sp.style.minWidth=PP_SPLIT_W+'px'; }
        var cn = document.getElementById('pp-col-names');
        if (cn) { cn.style.width=cw+'px'; cn.style.minWidth=cw+'px'; cn.style.maxWidth=cw+'px'; }
        // Check for zoomed range
        var pd = document.getElementById('pp-plotly-div');
        if (pd && pd.layout && pd.layout.xaxis && pd.layout.xaxis.range) {
          var r = pd.layout.xaxis.range;
          if (r[0] > 0.5 || r[1] < _pp.barColCount - 0.5) {
            _pp_rebuildTimescaleFromRange(r);
            return;
          }
        }
        _pp_buildTimescaleHeader();
      }

      function _pp_rebuildTimescaleFromRange(range) {
        var pp = document.getElementById('pp-plot-pane');
        var pw = pp ? pp.offsetWidth : 800;
        var rw = range[1]-range[0];
        if (rw <= 0) return;
        var ppc = pw / rw;
        var mr = document.getElementById('pp-header-months');
        if (mr) {
          mr.innerHTML = '';
          _pp.monthBands.forEach(function(b) {
            var vs = Math.max(b.startCol, range[0]);
            var ve = Math.min(b.endCol, range[1]);
            if (ve<=vs) return;
            var cw = Math.round((ve-vs)*ppc);
            var d = document.createElement('div');
            d.className = 'pp-ts-cell';
            d.style.cssText = 'width:'+cw+'px;min-width:'+cw+'px;overflow:hidden;white-space:nowrap;padding:3px 4px;font-size:11px;font-weight:bold;color:white;font-family:Arial,sans-serif;border-right:1px solid #0d47a1;box-sizing:border-box;';
            d.textContent = b.label;
            mr.appendChild(d);
          });
        }
        var wr = document.getElementById('pp-header-weeks');
        if (wr) {
          wr.innerHTML = '';
          for (var i=0; i<_pp.weekTicks.length; i++) {
            var t = _pp.weekTicks[i];
            var nc = i+1<_pp.weekTicks.length ? _pp.weekTicks[i+1].col : _pp.barColCount;
            var vs = Math.max(t.col, range[0]);
            var ve = Math.min(nc, range[1]);
            if (ve<=vs) continue;
            var cw2 = Math.round((ve-vs)*ppc);
            var d2 = document.createElement('div');
            d2.className = 'pp-ts-cell';
            d2.style.cssText = 'width:'+cw2+'px;min-width:'+cw2+'px;overflow:hidden;white-space:nowrap;padding:3px 4px;font-size:10px;color:#bbdefb;font-family:Arial,sans-serif;border-right:1px solid #0d47a1;box-sizing:border-box;';
            d2.textContent = t.label;
            wr.appendChild(d2);
          }
        }
      }

      // =========================================================================
      //  PLOTLY RENDER
      // =========================================================================
      function _pp_renderPlotly() {
        var div = document.getElementById('pp-plotly-div');
        if (!div) { setTimeout(_pp_renderPlotly, 200); return; }
        Plotly.newPlot(div, _pp.traces, _pp.layout, { responsive:false, displayModeBar:false });
        div.on('plotly_click', function(data) {
          try {
            if (!data || !data.points || !data.points.length) return;
            var pt = data.points[0];
            var taskId = String(pt.customdata || pt.text || '').trim();
            if (!taskId || taskId==='undefined' || taskId==='null' || taskId==='') return;
            var rowIdx = -1;
            for (var i=0; i<_pp.rowMeta.length; i++) {
              if (String(_pp.rowMeta[i].taskId) === taskId) { rowIdx=i; break; }
            }
            if (rowIdx >= 0) _pp_selectRow(rowIdx, taskId);
            else if (_pp.form) anvil.call(_pp.form, '_on_gantt_click', {text:taskId});
          } catch(e) { console.warn('[plotly_click]', e); }
        });
      }

      // =========================================================================
      //  COLLAPSE
      // =========================================================================
      function _pp_isRowVisible(idx) {
        var m = _pp.rowMeta[idx]; if (!m) return true;
        var pid = m.parentWbsId;
        while (pid) {
          if (_pp.collapseState[pid] === false) return false;
          var owner = null;
          for (var i=0; i<_pp.rowMeta.length; i++) {
            if (_pp.rowMeta[i].wbsId===pid && _pp.rowMeta[i].rowType==='WBS') { owner=_pp.rowMeta[i]; break; }
          }
          pid = owner ? owner.parentWbsId : null;
        }
        return true;
      }

      function _pp_applyCollapseState(animate) {
        var table = document.getElementById('pp-col-table'); if (!table) return;
        table.querySelectorAll('tr[data-row-idx]').forEach(function(tr) {
          var idx=parseInt(tr.getAttribute('data-row-idx'));
          var m=_pp.rowMeta[idx]; if(!m) return;
          var vis=_pp_isRowVisible(idx), cur=tr.style.display!=='none';
          if (animate&&!vis&&cur) {
            tr.style.transition='opacity '+PP_COLLAPSE_MS+'ms'; tr.style.opacity='0';
            setTimeout(function(){tr.style.display='none';tr.style.opacity='';tr.style.transition='';},PP_COLLAPSE_MS);
          } else if (animate&&vis&&!cur) {
            tr.style.display='';tr.style.opacity='0';tr.style.transition='opacity '+PP_COLLAPSE_MS+'ms';
            setTimeout(function(){tr.style.opacity='1';setTimeout(function(){tr.style.opacity='';tr.style.transition='';},PP_COLLAPSE_MS);},10);
          } else { tr.style.display=vis?'':'none'; }
          if (m.rowType==='WBS'&&m.wbsId) {
            var icon=tr.querySelector('.pp-wbs-icon');
            if(icon) icon.textContent=(_pp.collapseState[m.wbsId]!==false)?'\u25BC':'\u25B6';
          }
        });
        setTimeout(_pp_syncPlotlyToCollapse, animate?PP_COLLAPSE_MS+50:0);
      }

      function _pp_syncPlotlyToCollapse() {
        var newY={},yPos=0;
        for(var i=0;i<_pp.rowMeta.length;i++){if(_pp_isRowVisible(i))newY[i]=yPos++;}
        var vc=yPos;
        var nt=JSON.parse(JSON.stringify(_pp.traces));
        nt.forEach(function(tr){
          if(!tr.y)return;
          var nx=[],ny=[],ntx=[],nc=[];
          for(var j=0;j<tr.y.length;j++){
            var y=tr.y[j];
            if(y===null||y===undefined){nx.push(null);ny.push(null);ntx.push(tr.text?(tr.text[j]||''):'');nc.push(tr.customdata?(tr.customdata[j]||''):'');}
            else{var ri=Math.round(y);if(newY.hasOwnProperty(ri)){nx.push(tr.x[j]);ny.push(newY[ri]);ntx.push(tr.text?(tr.text[j]||''):'');nc.push(tr.customdata?(tr.customdata[j]||''):'');}}
          }
          tr.x=nx;tr.y=ny;if(tr.text)tr.text=ntx;if(tr.customdata)tr.customdata=nc;
        });
        var nl=JSON.parse(JSON.stringify(_pp.layout));
        if(nl.shapes){nl.shapes=nl.shapes.filter(function(s){return newY.hasOwnProperty(Math.round((s.y0+s.y1)/2));}).map(function(s){var n2=newY[Math.round((s.y0+s.y1)/2)];return Object.assign({},s,{y0:n2-0.5,y1:n2+0.5});});}
        var nh=Math.max(_pp.rowH,vc*_pp.rowH);nl.height=nh;nl.yaxis.range=[vc,-1];
        var pd=document.getElementById('pp-plotly-div');
        if(pd)pd.style.height=nh+'px';
        Plotly.react(pd,nt,nl,{responsive:false,displayModeBar:false});
      }

      window._pp_toggleWbs = function(wbsId) {
        var cur=(_pp.collapseState[wbsId]!==false);_pp.collapseState[wbsId]=!cur;
        _pp_applyCollapseState(PP_COLLAPSE_MS>0);
        if(_pp.form){try{anvil.call(_pp.form,'_on_collapse_change',wbsId,!cur);}catch(e){}}
      };
      window._pp_expandAll = function() {
        _pp.rowMeta.forEach(function(m){if(m.wbsId)_pp.collapseState[m.wbsId]=true;});
        _pp_applyCollapseState(false);
        if(_pp.form){try{anvil.call(_pp.form,'_on_collapse_all',true);}catch(e){}}
      };
      window._pp_collapseAll = function() {
        _pp.rowMeta.forEach(function(m){if(m.wbsId&&m.depth===1)_pp.collapseState[m.wbsId]=false;});
        _pp_applyCollapseState(false);
        if(_pp.form){try{anvil.call(_pp.form,'_on_collapse_all',false);}catch(e){}}
      };

      // =========================================================================
      //  KEYBOARD
      // =========================================================================
      function _pp_setupKeyboard() {
        document.addEventListener('keydown', function(e) {
          if(!e.ctrlKey)return;
          if(e.key==='='||e.key==='+'){e.preventDefault();_pp_expandAll();}
          if(e.key==='-'){e.preventDefault();_pp_collapseAll();}
        });
      }

      // =========================================================================
      //  SPLITTER
      // =========================================================================
      function _pp_setupSplitter() {
        var sp=document.getElementById('pp-splitter'),cd=document.getElementById('pp-col-data');
        if(!sp||!cd)return;
        var dragging=false,sx=0,sw=0;
        sp.addEventListener('mousedown',function(e){dragging=true;sx=e.clientX;sw=cd.offsetWidth;document.body.style.cursor='col-resize';document.body.style.userSelect='none';e.preventDefault();});
        document.addEventListener('mousemove',function(e){
          if(!dragging)return;
          var nw=Math.max(PP_COL_MIN_W,sw+(e.clientX-sx));
          cd.style.width=nw+'px';cd.style.minWidth=nw+'px';cd.style.maxWidth=nw+'px';
          var cn=document.getElementById('pp-col-names');
          if(cn){cn.style.width=nw+'px';cn.style.minWidth=nw+'px';cn.style.maxWidth=nw+'px';}
        });
        document.addEventListener('mouseup',function(){
          if(!dragging)return;dragging=false;
          document.body.style.cursor='';document.body.style.userSelect='';
          var pd=document.getElementById('pp-plotly-div'),pp=document.getElementById('pp-plot-pane');
          if(pd&&pp)Plotly.relayout(pd,{width:pp.offsetWidth});
          _pp_rebuildTimescaleHeader();
        });
      }

      // =========================================================================
      //  SCROLL SYNC
      // =========================================================================
      function _pp_setupScrollSync() {
        var cp=document.getElementById('pp-col-data'),pp=document.getElementById('pp-plot-pane'),hr=document.getElementById('pp-header-right');
        if(!cp||!pp)return;
        var sync=false;
        cp.addEventListener('scroll',function(){if(sync)return;sync=true;pp.scrollTop=cp.scrollTop;sync=false;});
        pp.addEventListener('scroll',function(){if(sync)return;sync=true;cp.scrollTop=pp.scrollTop;if(hr)hr.scrollLeft=pp.scrollLeft;sync=false;});
      }

      // =========================================================================
      //  TIMESCALE ZOOM / PAN
      //
      //  Pan:  drag in open space → shift visible range left/right
      //  Zoom: drag near divider → ANCHOR LEFT EDGE, change right edge
      //        drag right = zoom out (show more), drag left = zoom in (show less)
      // =========================================================================
      function _pp_setupTimescaleDrag() {
        var hr = document.getElementById('pp-header-right');
        if (!hr) return;
        var mr = document.getElementById('pp-header-months');
        var wr = document.getElementById('pp-header-weeks');
        var st = { active:false, mode:'pan', startX:0, startRange:[0,0] };

        function nearDivider(e) {
          var rows = [mr, wr];
          for (var r=0; r<rows.length; r++) {
            var row=rows[r]; if(!row) continue;
            var cells=row.children, off=row.getBoundingClientRect().left;
            for (var i=0; i<cells.length; i++) {
              off += cells[i].offsetWidth;
              if (Math.abs(e.clientX-off) <= PP_TS_SNAP_PX) return true;
            }
          }
          return false;
        }
        function curRange() {
          var pd=document.getElementById('pp-plotly-div');
          if(pd&&pd.layout&&pd.layout.xaxis&&pd.layout.xaxis.range){var r=pd.layout.xaxis.range;return[r[0],r[1]];}
          return [0, _pp.barColCount];
        }

        hr.addEventListener('mousemove', function(e) {
          if(st.active)return;
          hr.style.cursor = nearDivider(e) ? 'col-resize' : 'grab';
        });

        hr.addEventListener('mousedown', function(e) {
          if(e.button!==0)return; e.preventDefault();
          st.active=true; st.startX=e.clientX; st.startRange=curRange();
          st.mode = nearDivider(e) ? 'zoom' : 'pan';
          hr.style.cursor = st.mode==='zoom' ? 'col-resize' : 'grabbing';
          document.body.style.userSelect='none';
        });

        document.addEventListener('mousemove', function(e) {
          if(!st.active)return;
          var pp=document.getElementById('pp-plot-pane');
          var pw=pp?pp.offsetWidth:800;
          var rw=st.startRange[1]-st.startRange[0];
          var dx=e.clientX-st.startX;
          var cd=(dx/pw)*rw;
          var nr;

          if (st.mode==='pan') {
            nr = [st.startRange[0]-cd, st.startRange[1]-cd];
            // Clamp
            if(nr[0]<0){nr[1]-=nr[0];nr[0]=0;}
            if(nr[1]>_pp.barColCount){nr[0]-=(nr[1]-_pp.barColCount);nr[1]=_pp.barColCount;}
                                     } else {
                                      // Zoom: anchor left edge, change right edge only
                                      // drag right = zoom out (bigger range), drag left = zoom in (smaller range)
                                      nr = [st.startRange[0], st.startRange[1]+cd];
                                      if(nr[1]-nr[0]<7) nr[1]=nr[0]+7;   // min 1 week
                                      if(nr[1]>_pp.barColCount) nr[1]=_pp.barColCount;
                                     }

                                      var pd=document.getElementById('pp-plotly-div');
                                      if(pd) Plotly.relayout(pd, {'xaxis.range':nr});
                                      _pp_rebuildTimescaleFromRange(nr);
                                     });

                                      document.addEventListener('mouseup', function() {
                                      if(!st.active)return;
                                      st.active=false; hr.style.cursor='grab'; document.body.style.userSelect='';
                                     });
                                     }

                                      </script>
